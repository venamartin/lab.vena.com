baseurl = "/"
relativeURLs = false
DefaultContentLanguage = "en"
title = "vena lab"

# Themes are now handled entirely by Hugo Modules below.
# Commenting out the old theme declarations to prevent conflicts:
# theme = "beautifulhugo"
# theme = "github.com/halogenica/beautifulhugo"

pygmentsStyle = "trac"
pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsCodefencesGuessSyntax = true
#pygmentsUseClassic = true
#pygmentOptions = "linenos=inline"

[module]
  # 1. Mount the Beautiful Hugo theme
  [[module.imports]]
    path = "github.com/halogenica/beautifulhugo"

[Services]
  [Services.Disqus]
    # Shortname = "XXX"
  [Services.googleAnalytics]
    # id = "XXX"

[Params]
#  homeTitle = "Beautiful Hugo Theme" # Set a different text for the header on the home page
#  subtitle = "Vena Engineering Corp Lab"

  # Added "meshcore" to mainSections so your mounted posts appear on the homepage feed!
  mainSections = ["post", "meshcore", "ais", "aprs"]
  
  logo = "img/square-logo.png" # Expecting square dimensions
  favicon = "img/square-logo.png"
  dateFormat = "January 2, 2006"
  custom_css = ["css/custom.css"]
  commit = false
  rss = true
  comments = true
  readingTime = true
  wordCount = true
  useHLJS = true
  socialShare = false
  delayDisqus = true
  showRelatedPosts = true
#  cusdisID = "XXX" # Get your App id from cusdis.com
#  hideAuthor = true
#  gcse = "012345678901234567890:abcdefghijk" # Get your code from google.com/cse. Make sure to go to "Look and Feel" and change Layout to "Full Width" and Theme to "Classic"
#  disclaimerText = "The opinions expressed herein are my own personal opinions and do not represent my employer’s view in any way."

