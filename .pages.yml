# .pages.yml

# Media settings for your images
media:
  - name: aprs_images
    label: APRS Images
    input: static/images/aprs
    output: /static/images/aprs
    extensions: [png, jpg, webp]
  - name: meshcore_images
    label: Meshcore Images
    input: static/images/meshcore
    output: /static/images/meshcore
    extensions: [png, jpg, webp]
  - name: ais_images
    label: AIS Images
    input: static/images/ais
    output: /static/images/ais
    extensions: [png, jpg, webp]   
    
     
# Content collections mapping
content:
  - name: aprs
    label: APRS
    path: content/aprs
    type: collection
    fields: &default_fields
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
      - name: tags
        label: Tags
        type: string
        list: true
      - name: author
        label: Author
        type: string
      - name: draft
        label: Draft
        type: boolean
      - name: body
        label: Content
        type: rich-text

  - name: ais
    label: AIS
    path: content/ais
    type: collection
    fields: *default_fields

  - name: meshcore
    label: Meshcore
    path: content/meshcore
    type: collection
    fields: *default_fields

  - name: page
    label: Pages
    path: content/page
    type: collection
    fields: *default_fields

  - name: post
    label: Posts
    path: content/post
    type: collection
    fields: *default_fields
    